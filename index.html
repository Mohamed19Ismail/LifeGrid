// ── PLANNER + CALENDAR (v3 — smart repeats, date ranges, UX polish) ─────────
function Planner(){
  const [tasks,setTasks]   = useState(()=>store.get("lg_tasks",[]));
  const [view,setView]     = useState("today");
  const [showAdd,setShowAdd]= useState(false);
  const [editTask,setEditTask]= useState(null);   // task being edited
  const [selectedDate,setSelectedDate]= useState(null);
  const [calMonth,setCalMonth]= useState(new Date());
  const [filterCat,setFilterCat]= useState("All");
  const [filterPri,setFilterPri]= useState("All");

  // ── form fields ──
  const blankForm={title:"",startDate:toISO(new Date()),endDate:"",time:"09:00",
    priority:"medium",repeat:"none",cat:"Personal",notes:""};
  const [form,setForm]=useState(blankForm);
  const F=(k,v)=>setForm(p=>({...p,[k]:v}));

  useEffect(()=>{ store.set("lg_tasks",tasks); },[tasks]);

  // ── date helpers ──
  function toISO(d){ return d.toISOString().split("T")[0]; }
  function todayISO(){ return toISO(new Date()); }
  function tomorrowISO(){ const d=new Date(); d.setDate(d.getDate()+1); return toISO(d); }
  function addDays(iso,n){ const d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+n); return toISO(d); }
  function dayOfWeek(iso){ return new Date(iso+"T00:00:00").getDay(); } // 0=Sun
  function daysUntil(iso){ return Math.round((new Date(iso+"T00:00:00")-new Date(todayISO()+"T00:00:00"))/86400000); }
  function fmtDate(iso){
    const du=daysUntil(iso);
    if(du===0) return "Today"; if(du===1) return "Tomorrow"; if(du===-1) return "Yesterday";
    return new Date(iso+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  }

  // ── REPEAT ENGINE ─────────────────────────────────────────────────────────
  // For a base task, generate the ISO dates it should appear on
  // within a 90-day window from today.
  function getOccurrences(task){
    if(task.repeat==="none") return [task.startDate];
    const start=task.startDate;
    const end=task.endDate||addDays(todayISO(),90);
    const cap=addDays(todayISO(),90);
    const until=end<cap?end:cap;
    const dates=[];
    let cur=start;
    while(cur<=until){
      const dow=dayOfWeek(cur);
      const include=
        task.repeat==="daily"   ? true :
        task.repeat==="weekdays"? dow>=1&&dow<=5 :
        task.repeat==="weekly"  ? cur===start||((new Date(cur+"T00:00:00")-new Date(start+"T00:00:00"))%(7*86400000)===0) :
        task.repeat==="monthly" ? new Date(cur+"T00:00:00").getDate()===new Date(start+"T00:00:00").getDate() :
        task.repeat==="range"   ? true : false;
      if(include) dates.push(cur);
      cur=addDays(cur,1);
    }
    return dates;
  }

  // Returns all "virtual" task instances for a given ISO date
  function getTasksForDate(iso){
    const result=[];
    tasks.forEach(t=>{
      const occs=getOccurrences(t);
      if(occs.includes(iso)){
        // Completion is stored per date: doneOn:{iso:true}
        const done=t.doneOn?.[iso]||false;
        result.push({...t,occDate:iso,done});
      }
    });
    return result.sort((a,b)=>a.time.localeCompare(b.time));
  }

  // Toggle done for a specific occurrence
  const toggleTask=(id,iso)=>setTasks(prev=>prev.map(t=>{
    if(t.id!==id) return t;
    const doneOn={...(t.doneOn||{}),[iso]:!(t.doneOn?.[iso])};
    return {...t,doneOn};
  }));

  const delTask=id=>{ if(window.confirm("Delete this task and all its repeats?")) setTasks(prev=>prev.filter(t=>t.id!==id)); };

  // ── save (add or edit) ──
  const saveTask=()=>{
    if(!form.title.trim()) return;
    if(editTask){
      setTasks(prev=>prev.map(t=>t.id===editTask.id?{...t,...form,id:t.id,doneOn:t.doneOn||{}}:t));
      setEditTask(null);
    } else {
      setTasks(prev=>[...prev,{...form,id:Date.now(),doneOn:{}}]);
    }
    setForm(blankForm); setShowAdd(false);
  };

  const openEdit=(t)=>{ setForm({title:t.title,startDate:t.startDate,endDate:t.endDate||"",
    time:t.time,priority:t.priority,repeat:t.repeat,cat:t.cat,notes:t.notes});
    setEditTask(t); setShowAdd(true); };

  // ── notifications ──
  const askNotif=()=>{
    if("Notification" in window&&Notification.permission==="default"){
      Notification.requestPermission().then(p=>{
        if(p==="granted") showTomorrowNotif();
      });
    }
  };
  const showTomorrowNotif=()=>{
    const tm=getTasksForDate(tomorrowISO()).filter(t=>!t.done);
    if(!tm.length) return;
    const now=new Date(), nine=new Date(now.getFullYear(),now.getMonth(),now.getDate(),21,0,0);
    const ms=nine-now;
    if(ms>0&&ms<86400000) setTimeout(()=>{
      new Notification("LifeGrid 🌙 Plan for tomorrow",{
        body:`${tm.length} task${tm.length>1?"s":""} tomorrow: ${tm.slice(0,2).map(t=>t.title).join(", ")}${tm.length>2?"...":""}`
      });
    },ms);
  };
  useEffect(()=>{ if("Notification" in window&&Notification.permission==="granted") showTomorrowNotif(); },[tasks]);

  // ── filter helpers ──
  function applyFilters(list){
    return list.filter(t=>(filterCat==="All"||t.cat===filterCat)&&(filterPri==="All"||t.priority===filterPri));
  }

  const PRIORITIES={
    high:{label:"High",color:C.rose,icon:"🔴"},
    medium:{label:"Medium",color:C.gold,icon:"🟡"},
    low:{label:"Low",color:C.green,icon:"🟢"},
  };
  const CATS=["Personal","Work","Health","Finance","Learning","Home","Social","Other"];
  const CAT_ICONS={"Personal":"👤","Work":"💼","Health":"💊","Finance":"💰","Learning":"📚","Home":"🏠","Social":"👥","Other":"📌"};
  const REPEATS=[
    {id:"none",label:"Does not repeat"},
    {id:"daily",label:"Every day"},
    {id:"weekdays",label:"Weekdays (Mon–Fri)"},
    {id:"weekly",label:"Every week"},
    {id:"monthly",label:"Every month"},
    {id:"range",label:"Date range (every day between)"},
  ];

  const today=todayISO(), tomorrow=tomorrowISO();
  const todayTasks=applyFilters(getTasksForDate(today));
  const tomorrowTasks=applyFilters(getTasksForDate(tomorrow));
  const todayPending=todayTasks.filter(t=>!t.done).length;
  const tomorrowPending=tomorrowTasks.filter(t=>!t.done).length;

  // upcoming: next 30 days grouped by date
  function getUpcoming(){
    const grouped={};
    for(let i=0;i<30;i++){
      const iso=addDays(today,i);
      const list=applyFilters(getTasksForDate(iso));
      if(list.length>0) grouped[iso]=list;
    }
    return grouped;
  }

  // ── calendar helpers ──
  function calDays(){
    const y=calMonth.getFullYear(),m=calMonth.getMonth();
    const first=new Date(y,m,1).getDay(), total=new Date(y,m+1,0).getDate();
    const days=[];
    for(let i=0;i<first;i++) days.push(null);
    for(let d=1;d<=total;d++) days.push(d);
    return days;
  }
  function calISO(d){
    if(!d) return null;
    return `${calMonth.getFullYear()}-${String(calMonth.getMonth()+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }

  // ── sub-components ──

  const TaskCard=({t,onToggle,onEdit,onDelete})=>{
    const p=PRIORITIES[t.priority]||PRIORITIES.medium;
    const du=daysUntil(t.occDate||t.startDate);
    const overdue=du<0&&!t.done;
    return(
      <div style={{background:C.card,border:`1px solid ${t.done?"#ffffff0a":overdue?C.rose+"55":p.color+"33"}`,
        borderRadius:16,padding:"13px 15px",transition:"all .2s",opacity:t.done?0.5:1,
        boxShadow:!t.done&&!overdue?`0 2px 14px ${p.color}14`:"none"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
          {/* Checkbox */}
          <div onClick={onToggle}
            style={{width:26,height:26,borderRadius:8,flexShrink:0,marginTop:1,
              border:`2px solid ${t.done?C.green:p.color}`,background:t.done?C.green:"transparent",
              display:"flex",alignItems:"center",justifyContent:"center",
              cursor:"pointer",transition:"all .2s",color:"#fff",fontSize:14,fontWeight:900}}>
            {t.done?"✓":""}
          </div>
          {/* Content */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,color:t.done?C.sub:C.text,fontSize:14,
              textDecoration:t.done?"line-through":"none",lineHeight:1.4}}>{t.title}</div>
            {/* Meta row */}
            <div style={{display:"flex",gap:8,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,color:C.sub}}>🕐 {t.time}</span>
              {t.repeat!=="none"&&(
                <span style={{fontSize:11,color:C.accent}}>🔁 {REPEATS.find(r=>r.id===t.repeat)?.label||t.repeat}</span>
              )}
              {overdue&&<span style={{fontSize:11,color:C.rose,fontWeight:700}}>⚠️ {Math.abs(du)}d overdue</span>}
              {t.endDate&&t.repeat==="range"&&<span style={{fontSize:11,color:C.sky}}>📅 Until {fmtDate(t.endDate)}</span>}
            </div>
            {/* Tags */}
            <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
              <span style={{fontSize:10,fontWeight:700,color:p.color,background:p.color+"18",
                border:`1px solid ${p.color}33`,borderRadius:99,padding:"2px 7px"}}>{p.icon} {p.label}</span>
              <span style={{fontSize:10,fontWeight:700,color:C.sub,background:C.card2,
                border:`1px solid ${C.border}`,borderRadius:99,padding:"2px 7px"}}>{CAT_ICONS[t.cat]} {t.cat}</span>
            </div>
            {t.notes&&<div style={{color:C.sub,fontSize:12,marginTop:7,lineHeight:1.5,
              background:C.surface,borderRadius:8,padding:"6px 10px"}}>{t.notes}</div>}
          </div>
          {/* Actions */}
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <div onClick={onEdit} style={{color:C.accent,cursor:"pointer",fontSize:14,padding:"2px 4px"}}>✎</div>
            <div onClick={onDelete} style={{color:C.dim,cursor:"pointer",fontSize:14,padding:"2px 4px"}}>✕</div>
          </div>
        </div>
      </div>
    );
  };

  const AddEditForm=()=>(
    <Card glow={C.accent}>
      <div style={{fontWeight:800,color:C.text,marginBottom:14,fontSize:15}}>
        {editTask?"✎ Edit Task":"📝 New Task"}
      </div>

      <input value={form.title} onChange={e=>F("title",e.target.value)}
        placeholder="What do you need to do?" autoFocus
        style={{width:"100%",background:C.surface,border:`1px solid ${form.title?C.accent:C.border}`,
          borderRadius:12,padding:"12px 14px",color:C.text,fontSize:14,outline:"none",marginBottom:10}}/>

      {/* Dates row */}
      <div style={{display:"flex",gap:10,marginBottom:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:4}}>
            {form.repeat==="range"?"📅 Start Date":"📅 Date"}
          </div>
          <input type="date" value={form.startDate} onChange={e=>F("startDate",e.target.value)}
            style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
              padding:"9px 12px",color:C.text,fontSize:13,outline:"none",colorScheme:"dark"}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:4}}>🕐 Time</div>
          <input type="time" value={form.time} onChange={e=>F("time",e.target.value)}
            style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
              padding:"9px 12px",color:C.text,fontSize:13,outline:"none",colorScheme:"dark"}}/>
        </div>
      </div>

      {/* Repeat */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:C.sub,marginBottom:4}}>🔁 Repeat</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {REPEATS.map(r=>(
            <div key={r.id} onClick={()=>F("repeat",r.id)}
              style={{padding:"6px 12px",borderRadius:99,cursor:"pointer",fontSize:12,fontWeight:600,
                background:form.repeat===r.id?C.accentLo:C.card2,
                color:form.repeat===r.id?C.accent:C.sub,
                border:`1px solid ${form.repeat===r.id?C.accent:C.border}`,userSelect:"none"}}>
              {r.label}
            </div>
          ))}
        </div>
      </div>

      {/* End date — show for range or any repeat */}
      {(form.repeat==="range"||form.repeat!=="none")&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:4}}>
            {form.repeat==="range"?"📅 End Date (task runs every day until here)":"📅 Repeat Until (optional)"}
          </div>
          <input type="date" value={form.endDate} onChange={e=>F("endDate",e.target.value)}
            min={form.startDate}
            style={{width:"100%",background:C.surface,border:`1px solid ${form.endDate?C.accent:C.border}`,
              borderRadius:10,padding:"9px 12px",color:C.text,fontSize:13,outline:"none",colorScheme:"dark"}}/>
          {form.endDate&&<div style={{fontSize:11,color:C.accent,marginTop:4}}>
            ✓ Task will appear on every matching day from {fmtDate(form.startDate)} to {fmtDate(form.endDate)}
          </div>}
        </div>
      )}

      {/* Priority */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:C.sub,marginBottom:4}}>🎯 Priority</div>
        <div style={{display:"flex",gap:8}}>
          {Object.entries(PRIORITIES).map(([k,p])=>(
            <div key={k} onClick={()=>F("priority",k)}
              style={{flex:1,padding:"8px 4px",borderRadius:10,cursor:"pointer",textAlign:"center",
                background:form.priority===k?p.color+"22":C.card2,
                border:`1px solid ${form.priority===k?p.color:C.border}`,
                color:form.priority===k?p.color:C.sub,fontWeight:600,fontSize:12,userSelect:"none"}}>
              {p.icon} {p.label}
            </div>
          ))}
        </div>
      </div>

      {/* Category */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:C.sub,marginBottom:4}}>📁 Category</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {CATS.map(c=>(
            <div key={c} onClick={()=>F("cat",c)}
              style={{padding:"6px 12px",borderRadius:99,cursor:"pointer",fontSize:12,fontWeight:600,
                background:form.cat===c?C.accentLo:C.card2,
                color:form.cat===c?C.accent:C.sub,
                border:`1px solid ${form.cat===c?C.accent:C.border}`,userSelect:"none"}}>
              {CAT_ICONS[c]} {c}
            </div>
          ))}
        </div>
      </div>

      <textarea value={form.notes} onChange={e=>F("notes",e.target.value)} rows={2}
        placeholder="Notes or details... (optional)"
        style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
          padding:"9px 12px",color:C.text,fontSize:13,outline:"none",resize:"none",marginBottom:12}}/>

      <div style={{display:"flex",gap:8}}>
        <Btn onClick={saveTask} disabled={!form.title.trim()} style={{flex:1}}>
          {editTask?"Save Changes":"Add Task"}
        </Btn>
        <Btn onClick={()=>{setShowAdd(false);setEditTask(null);setForm(blankForm);}}
          color={C.border} style={{flex:1,color:C.sub,boxShadow:"none"}}>Cancel</Btn>
      </div>
    </Card>
  );

  const CalendarView=()=>{
    const days=calDays();
    const DOW=["Su","Mo","Tu","We","Th","Fr","Sa"];
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <button onClick={()=>setCalMonth(m=>new Date(m.getFullYear(),m.getMonth()-1,1))}
            style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:10,
              padding:"7px 14px",color:C.text,cursor:"pointer",fontSize:14}}>‹</button>
          <div style={{fontWeight:800,color:C.text,fontSize:15}}>
            {calMonth.toLocaleDateString("en-US",{month:"long",year:"numeric"})}
          </div>
          <button onClick={()=>setCalMonth(m=>new Date(m.getFullYear(),m.getMonth()+1,1))}
            style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:10,
              padding:"7px 14px",color:C.text,cursor:"pointer",fontSize:14}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:14}}>
          {DOW.map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:11,color:C.dim,fontWeight:700,padding:"4px 0"}}>{d}</div>
          ))}
          {days.map((d,i)=>{
            const iso=calISO(d);
            const isToday=iso===today, isSel=iso===selectedDate;
            const dayTasks=iso?getTasksForDate(iso):[];
            const pending=dayTasks.filter(t=>!t.done).length;
            const done=dayTasks.filter(t=>t.done).length;
            const hasTasks=dayTasks.length>0;
            return(
              <div key={i} onClick={()=>d&&setSelectedDate(iso)}
                style={{aspectRatio:"1",borderRadius:10,display:"flex",flexDirection:"column",
                  alignItems:"center",justifyContent:"center",cursor:d?"pointer":"default",
                  background:isSel?C.accent:isToday?C.accentLo:hasTasks?C.card2:"transparent",
                  border:`1px solid ${isSel?C.accent:isToday?C.accent+"66":hasTasks?C.border:"transparent"}`,
                  transition:"all .15s"}}>
                {d&&<>
                  <div style={{fontSize:13,fontWeight:isToday||isSel?800:400,
                    color:isSel?"#fff":isToday?C.accent:C.text}}>{d}</div>
                  {hasTasks&&(
                    <div style={{display:"flex",gap:2,marginTop:2}}>
                      {pending>0&&<div style={{width:5,height:5,borderRadius:"50%",background:C.gold}}/>}
                      {done>0&&<div style={{width:5,height:5,borderRadius:"50%",background:C.green}}/>}
                    </div>
                  )}
                </>}
              </div>
            );
          })}
        </div>
        {selectedDate&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:700,color:C.text,fontSize:14}}>
                {fmtDate(selectedDate)} · {getTasksForDate(selectedDate).length} tasks
              </div>
              <div onClick={()=>{F("startDate",selectedDate);setShowAdd(true);}}
                style={{color:C.accent,cursor:"pointer",fontSize:13,fontWeight:700}}>+ Add</div>
            </div>
            {getTasksForDate(selectedDate).length===0?(
              <div style={{textAlign:"center",padding:"16px 0",color:C.sub,fontSize:14}}>No tasks — tap + Add to plan this day</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {getTasksForDate(selectedDate).map(t=>(
                  <TaskCard key={t.id+t.occDate} t={t}
                    onToggle={()=>toggleTask(t.id,t.occDate)}
                    onEdit={()=>openEdit(t)}
                    onDelete={()=>delTask(t.id)}/>
                ))}
              </div>
            )}
          </div>
        )}
        {!selectedDate&&<div style={{textAlign:"center",padding:"10px 0",color:C.dim,fontSize:13}}>Tap any date to see or add tasks</div>}
      </div>
    );
  };

  // ── Filters bar ──
  const Filters=()=>(
    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:2}}>
      {["All",...CATS].map(c=>(
        <div key={c} onClick={()=>setFilterCat(c)}
          style={{padding:"5px 12px",borderRadius:99,cursor:"pointer",fontSize:12,fontWeight:600,
            background:filterCat===c?C.accentLo:C.card2,color:filterCat===c?C.accent:C.sub,
            border:`1px solid ${filterCat===c?C.accent:C.border}`,userSelect:"none",whiteSpace:"nowrap",flexShrink:0}}>
          {c==="All"?"All":CAT_ICONS[c]+" "+c}
        </div>
      ))}
    </div>
  );

  // ── main render ──
  const upcoming=getUpcoming();
  const totalTasks=tasks.length;
  const totalDoneToday=todayTasks.filter(t=>t.done).length;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,fontFamily:FD,color:C.text}}>Planner 📅</div>
          <div style={{fontSize:13,color:C.sub,marginTop:2}}>Plan your days, own your time</div>
        </div>
        <button onClick={()=>{
            setEditTask(null);
            setForm({...blankForm,startDate:view==="tomorrow"?tomorrow:view==="calendar"&&selectedDate?selectedDate:today});
            setShowAdd(true);
          }}
          style={{background:C.accent,border:"none",borderRadius:12,padding:"9px 18px",
            color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,
            boxShadow:`0 4px 16px ${C.accent}44`}}>+ Task</button>
      </div>

      {/* Evening reminder nudge */}
      {"Notification" in window&&Notification.permission==="default"&&tomorrowPending>0&&(
        <div style={{background:`linear-gradient(135deg,${C.accent}18,${C.gold}12)`,
          border:`1px solid ${C.accent}33`,borderRadius:14,padding:"12px 14px",
          display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:24}}>🌙</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>Get evening reminders</div>
            <div style={{color:C.sub,fontSize:12}}>9pm nudge with tomorrow's {tomorrowPending} tasks</div>
          </div>
          <button onClick={askNotif}
            style={{background:C.accent,border:"none",borderRadius:9,padding:"7px 12px",
              color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0}}>Enable</button>
        </div>
      )}

      {/* Stats */}
      <div style={{display:"flex",gap:10}}>
        <Stat icon="📋" label="Today's tasks" val={todayTasks.length} color={C.accent}/>
        <Stat icon="✅" label="Done today" val={totalDoneToday} color={C.green}/>
        <Stat icon="🌅" label="Tomorrow" val={tomorrowPending} color={C.gold}/>
      </div>

      {/* View tabs */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:2}}>
        {[
          {id:"today",label:"Today",badge:todayPending},
          {id:"tomorrow",label:"Tomorrow",badge:tomorrowPending},
          {id:"upcoming",label:"Upcoming"},
          {id:"calendar",label:"📅 Calendar"},
        ].map(v=>(
          <div key={v.id} onClick={()=>setView(v.id)}
            style={{padding:"7px 14px",borderRadius:99,cursor:"pointer",fontWeight:600,fontSize:13,
              background:view===v.id?C.accent+"22":C.card2,color:view===v.id?C.accent:C.sub,
              border:`1px solid ${view===v.id?C.accent:C.border}`,
              userSelect:"none",whiteSpace:"nowrap",flexShrink:0,position:"relative"}}>
            {v.label}
            {v.badge>0&&<span style={{marginLeft:5,background:C.rose,color:"#fff",
              borderRadius:99,padding:"1px 6px",fontSize:10,fontWeight:800}}>{v.badge}</span>}
          </div>
        ))}
      </div>

      {showAdd&&<AddEditForm/>}

      {/* CALENDAR */}
      {view==="calendar"&&<Card><CalendarView/></Card>}

      {/* TODAY */}
      {view==="today"&&<>
        <Filters/>
        {todayTasks.length===0?(
          <Empty icon="☀️" title="Nothing planned for today"
            desc="Add tasks for today and make every hour count."
            btnText="+ Add Today's Task" onBtn={()=>{setForm({...blankForm,startDate:today});setShowAdd(true);}}/>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {todayTasks.map(t=>(
              <TaskCard key={t.id+today} t={t}
                onToggle={()=>toggleTask(t.id,today)}
                onEdit={()=>openEdit(t)} onDelete={()=>delTask(t.id)}/>
            ))}
            {todayTasks.every(t=>t.done)&&(
              <div style={{textAlign:"center",padding:"16px",background:C.greenLo,
                border:`1px solid ${C.green}44`,borderRadius:16}}>
                <div style={{fontSize:28,marginBottom:6}}>🎉</div>
                <div style={{fontWeight:800,color:C.green,fontSize:15}}>All done for today!</div>
                <div style={{color:C.sub,fontSize:13,marginTop:4}}>You crushed it. Go plan tomorrow!</div>
              </div>
            )}
          </div>
        )}
      </>}

      {/* TOMORROW */}
      {view==="tomorrow"&&<>
        <div style={{background:`linear-gradient(135deg,${C.gold}18,${C.accent}12)`,
          border:`1px solid ${C.gold}33`,borderRadius:14,padding:"12px 16px",
          display:"flex",gap:10,alignItems:"center"}}>
          <div style={{fontSize:22}}>💡</div>
          <div style={{color:C.sub,fontSize:13,lineHeight:1.5}}>
            Plan tomorrow <strong style={{color:C.text}}>tonight</strong>. Users who pre-plan sleep better and accomplish 40% more.
          </div>
        </div>
        <Filters/>
        {tomorrowTasks.length===0?(
          <Empty icon="🌅" title="Tomorrow is wide open"
            desc="What will make tomorrow great? Add it now."
            btnText="+ Plan Tomorrow" onBtn={()=>{setForm({...blankForm,startDate:tomorrow});setShowAdd(true);}}/>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {tomorrowTasks.map(t=>(
              <TaskCard key={t.id+tomorrow} t={t}
                onToggle={()=>toggleTask(t.id,tomorrow)}
                onEdit={()=>openEdit(t)} onDelete={()=>delTask(t.id)}/>
            ))}
          </div>
        )}
      </>}

      {/* UPCOMING */}
      {view==="upcoming"&&<>
        <Filters/>
        {Object.keys(upcoming).length===0?(
          <Empty icon="🗓️" title="No upcoming tasks"
            desc="Schedule tasks for future dates to stay ahead."
            btnText="+ Schedule a Task" onBtn={()=>setShowAdd(true)}/>
        ):(
          Object.entries(upcoming).map(([iso,dayTasks])=>(
            <div key={iso}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,marginTop:4}}>
                <div style={{fontWeight:800,fontSize:14,
                  color:iso===today?C.green:iso===tomorrow?C.gold:C.text}}>
                  {fmtDate(iso)}
                </div>
                <div style={{flex:1,height:1,background:C.border}}/>
                <div style={{fontSize:11,color:C.sub}}>{dayTasks.filter(t=>!t.done).length} pending</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {dayTasks.map(t=>(
                  <TaskCard key={t.id+iso} t={t}
                    onToggle={()=>toggleTask(t.id,iso)}
                    onEdit={()=>openEdit(t)} onDelete={()=>delTask(t.id)}/>
                ))}
              </div>
            </div>
          ))
        )}
      </>}
    </div>
  );
}



// ── TABS ───────────────────────────────────────────────────────────────────
const TABS=[
  {id:"home",icon:"⚡",label:"Home"},
  {id:"habits",icon:"🔥",label:"Habits"},
  {id:"goals",icon:"🎯",label:"Goals"},
  {id:"budget",icon:"💰",label:"Budget"},
  {id:"time",icon:"⏱️",label:"Time"},
  {id:"mood",icon:"🧠",label:"Mood"},
  {id:"journal",icon:"📓",label:"Journal"},
  {id:"social",icon:"🏆",label:"Social"},
  {id:"ai",icon:"✨",label:"AI"},
  {id:"planner",icon:"📅",label:"Plan"},
  {id:"settings",icon:"⚙️",label:"Settings"},
];

// ── ROOT APP ───────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>store.get("lg_user",null));
  const [tab,setTab]=useState("home");
  const trackTab=(t)=>{ setTab(t); window.track&&window.track("tab_view",{tab:t}); };
  const [habits,setHabits]=useState(()=>store.get("lg_habits",[]));
  const [goals,setGoals]=useState(()=>store.get("lg_goals",[]));
  const [moodLog,setMoodLog]=useState(()=>store.get("lg_mood",[]));
  const [budget,setBudget]=useState(()=>store.get("lg_budget",{txns:[]}));

  // Auto-save on every change
  useEffect(()=>{ store.set("lg_habits",habits); },[habits]);
  useEffect(()=>{ store.set("lg_goals",goals); },[goals]);
  useEffect(()=>{ store.set("lg_mood",moodLog); },[moodLog]);
  useEffect(()=>{ store.set("lg_budget",budget); },[budget]);

  // Reset habits done=false each new day
  useEffect(()=>{
    const today=new Date().toDateString();
    const last=localStorage.getItem("lg_last_reset");
    if(last!==today){
      setHabits(prev=>prev.map(h=>({...h,done:false})));
      localStorage.setItem("lg_last_reset",today);
    }
  },[]);

  const handleDone=(userData)=>{
    store.set("lg_user",userData);
    setUser(userData);
    window.track&&window.track("signup_complete",{plan:userData.plan});
  };

  const handleReset=()=>{
    setUser(null); setHabits([]); setGoals([]); setMoodLog([]); setBudget({txns:[]});
  };

  if(!user) return <Onboarding onDone={handleDone}/>;

  const pages={
    home:<Home user={user} habits={habits} goals={goals} moodLog={moodLog} setTab={setTab}/>,
    habits:<Habits habits={habits} setHabits={setHabits}/>,
    goals:<Goals goals={goals} setGoals={setGoals}/>,
    budget:<Budget budget={budget} setBudget={setBudget}/>,
    time:<TimeTracker/>,
    mood:<Mood moodLog={moodLog} setMoodLog={setMoodLog}/>,
    journal:<Journal/>,
    social:<Social habits={habits} goals={goals}/>,
    planner:<Planner/>,
    ai:<AICoach user={user} habits={habits} goals={goals} budget={budget}/>,
    settings:<Settings user={user} onReset={handleReset}/>,
  };

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:FB,position:"relative",overflow:"hidden"}}>
      <Glow color={C.accent} top={-100} left={-100} size={380}/>
      <Glow color={C.gold} top="50%" left="65%" size={260} op={0.04}/>

      {/* Header */}
      <div style={{background:`${C.surface}f5`,backdropFilter:"blur(20px)",
        borderBottom:`1px solid ${C.border}`,padding:"13px 18px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        position:"sticky",top:0,zIndex:200}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,
            background:`linear-gradient(135deg,${C.accent},${C.gold})`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>⚡</div>
          <div>
            <div style={{fontWeight:900,fontSize:16,fontFamily:FD,letterSpacing:-.5}}>LifeGrid</div>
            <div style={{fontSize:9,color:C.dim,marginTop:-1}}>YOUR LIFE. TRACKED.</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {user.plan!=="free"&&(
            <div style={{background:C.accentLo,border:`1px solid ${C.accent}44`,
              borderRadius:99,padding:"3px 10px",fontSize:11,color:C.accent,fontWeight:700}}>PRO ✨</div>
          )}
          <div onClick={()=>setTab("settings")}
            style={{width:34,height:34,borderRadius:10,background:C.card,
              border:`1px solid ${C.border}`,display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:15,cursor:"pointer",fontWeight:900,color:C.text}}>
            {user.name[0].toUpperCase()}
          </div>
        </div>
      </div>

      {/* Page content */}
      <div key={tab} style={{padding:"18px 16px 110px",maxWidth:600,margin:"0 auto",
        position:"relative",zIndex:1, animation:"fadeUp .28s cubic-bezier(.4,0,.2,1)",
        ...(tab==="ai"?{height:"calc(100vh - 130px)",display:"flex",flexDirection:"column"}:{})}}>
        {pages[tab]}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,
        background:`${C.surface}f8`,backdropFilter:"blur(24px)",
        borderTop:`1px solid ${C.border}`,padding:"6px 2px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-around",maxWidth:600,margin:"0 auto"}}>
          {TABS.map(t=>(
            <div key={t.id} onClick={()=>trackTab(t.id)}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                padding:"5px 6px",borderRadius:12,cursor:"pointer",transition:"all .2s",
                background:tab===t.id?C.accentLo:"transparent",
                border:`1px solid ${tab===t.id?C.accent+"44":"transparent"}`,
                minWidth:40,position:"relative"}}>
              {tab===t.id&&<div style={{position:"absolute",top:-6,left:"50%",transform:"translateX(-50%)",
                width:20,height:3,borderRadius:99,background:C.accent}}/>}
              <div style={{fontSize:tab===t.id?18:16,transition:"font-size .2s"}}>{t.icon}</div>
              <div style={{fontSize:8,color:tab===t.id?C.accent:C.dim,fontWeight:tab===t.id?700:400}}>{t.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
